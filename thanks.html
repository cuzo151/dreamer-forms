<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Dreamer AI Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f4f4f4;color:#333;line-height:1.6;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{max-width:600px;margin:0 auto;padding:20px;width:100%}
.card{background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,.06);overflow:hidden}
.header{background:linear-gradient(135deg,#0F0F1A,#1A1A2E,#2a2040);padding:40px 32px;text-align:center}
.header h1{font-family:'Cormorant Garamond',Georgia,serif;color:#C5A55A;font-size:2rem;font-weight:300}
.header .badge{display:inline-block;background:rgba(197,165,90,.15);border:1px solid rgba(197,165,90,.3);color:#C5A55A;padding:4px 16px;border-radius:50px;font-size:.75rem;font-weight:600;margin-top:16px;letter-spacing:.05em}
.body{padding:48px 32px;text-align:center}
.check{font-size:64px;margin-bottom:16px}
.body h2{font-family:'Cormorant Garamond',Georgia,serif;color:#1A1A2E;font-size:1.6rem;margin-bottom:12px}
.body p{color:#555;font-size:.95rem;line-height:1.7;margin-bottom:8px}
.gold{color:#C5A55A;font-weight:600;margin-top:24px}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<div class="header">
  <h1>Dreamer AI Solutions</h1>
  <div class="badge">FORM SUBMITTED</div>
</div>
<div class="body">
  <div class="check">✅</div>
  <h2>Thank You, Patrick!</h2>
  <p>Your responses have been submitted successfully.</p>
  <p>Jason will review everything and get back to you with a proposal for North Jersey Pet Sitters shortly.</p>
  <p class="gold">We're excited to get started! 🐾</p>
</div>
</div>
</div>
</body>
</html>
